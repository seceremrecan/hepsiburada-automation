# ---------------------------------------------------------------
# Test ortami ayarlari (kimlik bilgileri BURAYA YAZILMAZ,
# onlar env/secrets/credentials.properties dosyasinda tutulur)
# ---------------------------------------------------------------

app.base.url = https://www.hepsiburada.com
browser = chrome

# value-infos ortam klasoru secimi (test / prep / live)
env = test

# Headless mod bot tespitini kolaylastirdigi icin varsayilan: false
headless = false

# Saniye cinsinden bekleme sureleri (WebDriverWait icin)
timeout.explicit.seconds = 15
timeout.pageload.seconds = 40

# Popup kontrolu icin kisa bekleme (saniye) — ana akisi bloklamamasi icin dusuk tutulur
popup.check.timeout.seconds = 2

# Insan-gibi yazma gecikmesi araligi (milisaniye, tus basina rastgele)
typing.delay.min.ms = 60
typing.delay.max.ms = 180

# Bos birakilirsa tarayicinin GERCEK user-agent'i kullanilir (onerilen).
# Sahte UA, gercek tarayici parmak iziyle celisip tespiti KOLAYLASTIRABILIR.
custom.user.agent =

# Kalici Chrome profili. BOS birakildi: boylece her kosu SIFIR profille acilir
# ve senaryo HER SEFERINDE bastan tam login akisini calistirir (istenen davranis).
# Doldurulursa (or. "chrome-profile") site cihazi tanir, SMS/OTP tekrarlanmaz
# ama onceki oturum hatirlandigindan login atlanir. Ikisi arasinda tercih size ait.
chrome.profile.dir =
